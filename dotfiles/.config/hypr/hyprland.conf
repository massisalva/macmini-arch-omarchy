# Configuracion modular inspirada en Omarchy para Apple Macmini7,1.
# Los archivos se cargan en orden; personal.conf queda reservado para ajustes locales.

source = ~/.config/hypr/conf.d/00-environment.conf
source = ~/.config/hypr/conf.d/10-monitors.conf
source = ~/.config/hypr/conf.d/20-input.conf
source = ~/.config/hypr/conf.d/30-look.conf
source = ~/.config/hypr/conf.d/40-autostart.conf
source = ~/.config/hypr/conf.d/50-bindings.conf
source = ~/.config/hypr/conf.d/60-rules.conf
source = ~/.config/hypr/personal.conf
