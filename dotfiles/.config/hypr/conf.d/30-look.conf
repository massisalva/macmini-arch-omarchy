general {
    gaps_in = 5
    gaps_out = 10
    border_size = 2
    col.active_border = rgba(7aa2f7ff)
    col.inactive_border = rgba(32344acc)
    layout = dwindle
    resize_on_border = true
}

decoration {
    rounding = 6
    active_opacity = 1.0
    inactive_opacity = 1.0
    dim_inactive = false
    blur {
        enabled = true
        size = 4
        passes = 1
        new_optimizations = true
    }
    shadow {
        enabled = true
        range = 8
        render_power = 2
        color = rgba(00000066)
    }
}

animations {
    enabled = true
    bezier = snappy, 0.2, 0.9, 0.3, 1.0
    animation = windows, 1, 1.5, snappy, slide
    animation = windowsOut, 1, 1, snappy, slide
    animation = workspaces, 1, 1.5, snappy, slide
    animation = fade, 1, 1, default
}

misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
    focus_on_activate = true
}
