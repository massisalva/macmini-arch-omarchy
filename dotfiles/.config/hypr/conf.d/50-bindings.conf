# Atajos inspirados en la configuracion Sway de la Conectar Igualdad.

# Aplicaciones y sesion
bind = $mainMod, Return, exec, uwsm app -- foot --app-id foot-term
bind = $mainMod, D, exec, uwsm app -- $menu
bind = $mainMod, V, exec, ~/.local/bin/clipboard-menu
bind = $mainMod SHIFT, V, exec, ~/.local/bin/clipboard-menu wipe
bind = $mainMod, B, exec, uwsm app -- firefox
bind = $mainMod, E, exec, uwsm app -- foot --app-id foot-files -e yazi
bind = $mainMod SHIFT, F, exec, uwsm app -- thunar
bind = $mainMod, P, exec, uwsm app -- foot --app-id foot-system -e btop
bind = $mainMod, M, exec, uwsm app -- foot --app-id foot-music-ncmpcpp -e ncmpcpp
bind = $mainMod, Q, killactive
bind = $mainMod SHIFT, C, exec, hyprctl reload
bind = $mainMod CTRL, L, exec, ~/.local/bin/lock-screen
bind = $mainMod SHIFT, P, exec, ~/.local/bin/power-menu

# Navegacion tipo Vim y flechas
bind = $mainMod, H, movefocus, l
bind = $mainMod, J, movefocus, d
bind = $mainMod, K, movefocus, u
bind = $mainMod, L, movefocus, r
bind = $mainMod, left, movefocus, l
bind = $mainMod, down, movefocus, d
bind = $mainMod, up, movefocus, u
bind = $mainMod, right, movefocus, r
bind = $mainMod SHIFT, H, movewindow, l
bind = $mainMod SHIFT, J, movewindow, d
bind = $mainMod SHIFT, K, movewindow, u
bind = $mainMod SHIFT, L, movewindow, r
bind = $mainMod SHIFT, left, movewindow, l
bind = $mainMod SHIFT, down, movewindow, d
bind = $mainMod SHIFT, up, movewindow, u
bind = $mainMod SHIFT, right, movewindow, r

# Ventanas y layout
bind = $mainMod, F, fullscreen
bind = $mainMod SHIFT, SPACE, togglefloating
bind = $mainMod SHIFT, F, centerwindow
bind = $mainMod, T, layoutmsg, togglesplit
bind = $mainMod, R, submap, resize

submap = resize
binde = , H, resizeactive, -10 0
binde = , J, resizeactive, 0 10
binde = , K, resizeactive, 0 -10
binde = , L, resizeactive, 10 0
binde = SHIFT, H, resizeactive, -30 0
binde = SHIFT, J, resizeactive, 0 30
binde = SHIFT, K, resizeactive, 0 -30
binde = SHIFT, L, resizeactive, 30 0
bind = , Return, submap, reset
bind = , Escape, submap, reset
submap = reset

# Scratchpad mediante workspace especial
bind = $mainMod SHIFT, minus, movetoworkspacesilent, special:scratchpad
bind = $mainMod, minus, togglespecialworkspace, scratchpad

# Workspaces tematicos
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10
bind = $mainMod, TAB, workspace, previous

# Capturas
bind = $mainMod SHIFT, S, exec, ~/.local/bin/screenshot-menu
bind = , Print, exec, ~/.local/bin/screenshot-menu full
bind = $mainMod, Print, exec, ~/.local/bin/screenshot-menu region
bind = SHIFT, Print, exec, ~/.local/bin/screenshot-menu window
bind = CTRL, Print, exec, ~/.local/bin/screenshot-menu full-copy
bind = $mainMod SHIFT, Print, exec, ~/.local/bin/screenshot-menu region-copy

# Audio y multimedia
bindel = , XF86AudioRaiseVolume, exec, swayosd-client --output-volume raise --max-volume 100
bindel = , XF86AudioLowerVolume, exec, swayosd-client --output-volume lower
bindl = , XF86AudioMute, exec, swayosd-client --output-volume mute-toggle
bindl = , XF86AudioMicMute, exec, swayosd-client --input-volume mute-toggle
bindl = , XF86AudioPlay, exec, swayosd-client --playerctl play-pause
bindl = , XF86AudioNext, exec, swayosd-client --playerctl next
bindl = , XF86AudioPrev, exec, swayosd-client --playerctl prev

bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow
